<!DOCTYPE html>
<html>
<head>
<style>body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f8ff;font-family:Arial}canvas{border:4px solid #333;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.3);cursor:pointer}</style>
</head>
<body>
<canvas id=c width=800 height=600></canvas>
<script>
c=document.getElementById('c');ctx=c.getContext('2d');let s={playing:0,over:1},g=s.playing,x=120,y=250,w=35,h=28,v=0,gv=.6,j=-13,r=0,sc=0,hs=localStorage.hs||0,st=1,mst=20,b=[],bs=2,bg=170,bw=45,bht=100,fc=0,bsr=110,k=e=>{(e.code=='Space'||e.code=='ArrowUp')&&(g==s.playing?v=j:g==s.over&&R())},document.addEventListener('keydown',k);c.addEventListener('click',()=>g==s.playing?v=j:g==s.over&&R());function S(){let th=bht+Math.random()*60;b.push({x:c.width,th,ph:c.height-th-bg,p:0})}function C(){if(y+h>c.height||y<0){O();return}for(let o of b){if(x<o.x+bw&&x+w>o.x&&(y<o.th||y+h>o.ph+c.height-bg-o.ph)){O();return}}}function O(){g=s.over;sc>hs&&(hs=sc,localStorage.hs=hs)}function R(){g=s.playing;sc=0;st=1;y=250;v=0;r=0;b=[];fc=0}function U(){if(g!=s.playing)return;fc++;v+=gv;y+=v;r=Math.max(Math.min(v*0.06,-.25),.25);st=Math.min(Math.floor(sc/8)+1,mst);bs=2+(st-1)*0.12;bg=Math.max(130,170-(st-1)*2);if(fc%bsr==0)S();for(let i=b.length-1;i>=0;i--){b[i].x-=bs;if(!b[i].p&&b[i].x+bw<x){b[i].p=1;sc++}if(b[i].x+bw<0)b.splice(i,1)}C()}function Dd(){ctx.save();ctx.translate(x+w/2,y+h/2);ctx.rotate(r);ctx.fillStyle='#D2691E';ctx.beginPath();ctx.arc(0,0,18,0,6.28);ctx.fill();ctx.fillStyle='#8B4513';ctx.beginPath();ctx.arc(-8,-6,11,0,6.28);ctx.fill();ctx.beginPath();ctx.moveTo(-16,-12);ctx.lineTo(-20,-22);ctx.lineTo(-12,-18);ctx.lineTo(-16,-12);ctx.fill();ctx.beginPath();ctx.moveTo(-6,-13);ctx.lineTo(-10,-23);ctx.lineTo(-2,-19);ctx.lineTo(-6,-13);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-12,-6,2.5,0,6.28);ctx.arc(-4,-6,2.5,0,6.28);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-12,-6,1.2,0,6.28);ctx.arc(-4,-6,1.2,0,6.28);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-8,-2,1.8,0,6.28);ctx.fill();ctx.restore()}function Db(){for(let o of b){ctx.fillStyle='#8B4513';ctx.fillRect(o.x,0,bw,o.th);ctx.fillStyle='#D2B48C';ctx.fillRect(o.x+3,3,bw-6,o.th-6);ctx.fillStyle='#8B4513';ctx.fillRect(o.x,c.height-o.ph,bw,o.ph);ctx.fillStyle='#D2B48C';ctx.fillRect(o.x+3,c.height-o.ph+3,bw-6,o.ph-6)}}function Dc(){ctx.fillStyle='rgba(255,255,255,.7)';for(let i=0;i<4;i++){let px=(fc*0.2+i*220)%920-110,py=60+i*35;ctx.beginPath();ctx.arc(px,py,25,0,6.28);ctx.arc(px+30,py,35,0,6.28);ctx.arc(px+60,py,25,0,6.28);ctx.fill()}}function D(){ctx.clearRect(0,0,c.width,c.height);Dc();if(g==s.playing){Db();Dd()}else{ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.font='bold 50px Arial';ctx.textAlign='center';ctx.fillText('GAME OVER',400,280);ctx.font='bold 36px Arial';ctx.fillText(`Score: ${sc}`,400,330);ctx.fillText(`Stage: ${st}/${mst}`,400,370);ctx.font='28px Arial';ctx.fillText('Click or SPACE to Restart',400,430);ctx.textAlign='left'}ctx.fillStyle='#333';ctx.font='bold 28px Arial';ctx.textAlign='left';ctx.fillText(`Score: ${sc}  Best: ${hs}`,20,40);ctx.fillText(`Stage ${st}/${mst}`,20,75)}function L(){U();D();requestAnimationFrame(L)}L();
</script>
</body>
</html>
